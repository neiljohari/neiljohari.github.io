---
layout: default
---

<div class="home">
  <div class="hero">
    <img class="profile-img" src="https://s.gravatar.com/avatar/c4a5814f42dcd0dac03f6bbd8d90216c?s=200" alt="{{ site.title }}" />
    <h1 class="hero-title">{{ site.title }}</h1>
    <p class="hero-tagline">{{ site.description }}</p>
    <div class="hero-links">
      <a href="https://github.com/{{ site.github_username }}" class="hero-link" title="GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
        GitHub
      </a>
      <a href="{{ "/assets/files/resume/resume.pdf" | relative_url }}" class="hero-link" title="Resume">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
        Resume
      </a>
      <a href="mailto:{{ site.email }}" class="hero-link" title="Email">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        Email
      </a>
    </div>
  </div>

  <div class="content-section">
    {{ content }}
  </div>

  {% if site.posts.size > 0 %}
  <div class="content-section">
    <h2>Recent Posts</h2>
    <ul class="post-list">
      {% for post in site.posts limit:5 %}
      <li>
        <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %-d, %Y" }}</time>
        <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
      </li>
      {% endfor %}
    </ul>
    <a href="{{ "/blog" | relative_url }}" class="all-posts-link">All posts &rarr;</a>
  </div>
  {% endif %}
</div>
